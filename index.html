<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>To Do List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F2F2F7;
      --surface: #FFFFFF;
      --surface2: #F9F9FB;
      --accent: #007AFF;
      --accent-soft: #E8F1FF;
      --danger: #FF3B30;
      --danger-soft: #FFF0EF;
      --success: #34C759;
      --success-soft: #EDFAF1;
      --warning: #FF9500;
      --text-primary: #1C1C1E;
      --text-secondary: #6E6E73;
      --text-tertiary: #AEAEB2;
      --separator: #E5E5EA;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --radius: 16px;
      --radius-sm: 10px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      padding-bottom: 40px;
    }

    /* Header */
    .header {
      background: rgba(242,242,247,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--separator);
    }

    .header h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }

    .header-sub {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
      font-weight: 500;
    }

    /* Progress bar */
    .progress-wrap {
      margin: 12px 16px 0;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-bar-bg {
      flex: 1;
      height: 8px;
      background: var(--separator);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--success);
      border-radius: 4px;
      transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .progress-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    /* Filter tabs */
    .filter-tabs {
      display: flex;
      gap: 8px;
      padding: 10px 16px 4px;
    }

    .filter-tab {
      flex: 1;
      background: var(--surface);
      border: none;
      border-radius: var(--radius-sm);
      padding: 8px 4px;
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: center;
    }

    .filter-tab.active {
      background: var(--accent);
      color: #fff;
    }

    .filter-tab:active { transform: scale(0.95); }

    /* Compose area */
    .compose {
      margin: 8px 16px 8px;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .compose-input-row {
      display: flex;
      align-items: center;
      gap: 0;
    }

    input[type="text"] {
      flex: 1;
      border: none;
      outline: none;
      padding: 16px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      background: transparent;
      line-height: 1.5;
    }

    input[type="text"]::placeholder { color: var(--text-tertiary); }

    /* Priority selector */
    .priority-select {
      border: none;
      outline: none;
      background: transparent;
      font-family: 'Nunito', sans-serif;
      font-size: 18px;
      cursor: pointer;
      padding: 0 8px;
      line-height: 1;
    }

    .btn-save {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 0;
      padding: 16px 18px;
      font-family: 'Nunito', sans-serif;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-save:active { opacity: 0.75; }
    .btn-save:disabled { background: var(--text-tertiary); cursor: not-allowed; }

    /* Section label */
    .section-label {
      padding: 10px 20px 6px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Todo list */
    .todo-list {
      margin: 0 16px;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .todo-item {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      transition: opacity 0.2s ease;
    }

    .todo-item.done {
      opacity: 0.55;
    }

    .todo-item:not(:last-child) {
      border-bottom: 1px solid var(--separator);
    }

    /* Checkbox */
    .todo-check {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2.5px solid var(--separator);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
      font-size: 13px;
    }

    .todo-check.checked {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }

    /* Priority dot */
    .priority-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .priority-dot.high { background: var(--danger); }
    .priority-dot.medium { background: var(--warning); }
    .priority-dot.low { background: var(--success); }

    .todo-body {
      flex: 1;
      min-width: 0;
    }

    .todo-text {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text-primary);
      word-break: break-word;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--text-tertiary);
    }

    .todo-meta {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 3px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* Action buttons */
    .todo-actions {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
      align-items: center;
    }

    .btn-edit, .btn-delete {
      border: none;
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-edit {
      background: #FFF3E0;
      color: var(--warning);
    }

    .btn-edit:active { opacity: 0.7; transform: scale(0.95); }

    .btn-delete {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .btn-delete:active { opacity: 0.7; transform: scale(0.95); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-tertiary);
    }

    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-title { font-size: 17px; font-weight: 700; color: var(--text-secondary); }
    .empty-desc { font-size: 13px; margin-top: 4px; font-weight: 500; }

    /* Edit modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-sheet {
      background: var(--surface);
      width: 100%;
      border-radius: 20px 20px 0 0;
      padding: 0 0 34px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-overlay.open .modal-sheet {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: var(--text-tertiary);
      border-radius: 2px;
      margin: 12px auto 16px;
      opacity: 0.4;
    }

    .sheet-title {
      font-size: 17px;
      font-weight: 800;
      text-align: center;
      padding: 0 20px 16px;
      color: var(--text-primary);
      border-bottom: 1px solid var(--separator);
    }

    .sheet-body { padding: 16px; }

    .edit-input {
      width: 100%;
      border: 1.5px solid var(--separator);
      border-radius: var(--radius-sm);
      outline: none;
      padding: 12px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      background: var(--surface2);
      resize: none;
      line-height: 1.5;
      transition: border-color 0.15s;
      margin-bottom: 10px;
    }

    .edit-input:focus { border-color: var(--accent); }

    .edit-priority-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .edit-priority-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .priority-btn {
      flex: 1;
      border: 1.5px solid var(--separator);
      border-radius: var(--radius-sm);
      padding: 8px 4px;
      background: var(--surface2);
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }

    .priority-btn.selected-high { background: var(--danger-soft); border-color: var(--danger); color: var(--danger); }
    .priority-btn.selected-medium { background: #FFF3E0; border-color: var(--warning); color: var(--warning); }
    .priority-btn.selected-low { background: var(--success-soft); border-color: var(--success); color: var(--success); }

    .sheet-actions {
      display: flex;
      gap: 10px;
      padding: 12px 16px 0;
    }

    .btn-cancel {
      flex: 1;
      background: var(--bg);
      color: var(--text-primary);
      border: none;
      border-radius: var(--radius-sm);
      padding: 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-update {
      flex: 2;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-cancel:active { opacity: 0.7; }
    .btn-update:active { transform: scale(0.97); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text-primary);
      color: #fff;
      padding: 12px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 300;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast-undo { color: var(--accent); font-weight: 800; cursor: pointer; }

    /* Count badge */
    .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 11px;
      font-weight: 800;
      border-radius: 10px;
      padding: 2px 8px;
      margin-left: 6px;
    }

    .done-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--success-soft);
      color: var(--success);
      font-size: 11px;
      font-weight: 800;
      border-radius: 10px;
      padding: 2px 8px;
      margin-left: 4px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1C1C1E;
        --surface: #2C2C2E;
        --surface2: #3A3A3C;
        --text-primary: #FFFFFF;
        --text-secondary: #AEAEB2;
        --text-tertiary: #636366;
        --separator: #3A3A3C;
        --accent-soft: #0A2040;
        --success-soft: #0A2A14;
      }
      .btn-edit { background: #2E1F00; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>✅ Jadwalkan <span id="todo-count-badge"></span></h1>
    <div class="header-sub">Kelola tugas kamu hari ini</div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
    </div>
    <span class="progress-label" id="progress-label">0 / 0 selesai</span>
  </div>

  <!-- Filter tabs -->
  <div class="filter-tabs">
    <button class="filter-tab active" data-filter="all">Semua</button>
    <button class="filter-tab" data-filter="active">Aktif</button>
    <button class="filter-tab" data-filter="done">Selesai</button>
  </div>

  <!-- Compose -->
  <div class="compose">
    <div class="compose-input-row">
      <select class="priority-select" id="priority-select" title="Prioritas">
        <option value="medium">🟡</option>
        <option value="high">🔴</option>
        <option value="low">🟢</option>
      </select>
      <input type="text" id="todo-input" placeholder="Tambah tugas baru..." maxlength="200" />
      <button class="btn-save" id="save" disabled title="Tambah">＋</button>
    </div>
  </div>

  <div class="section-label">
    <span id="section-title">Semua Tugas</span>
  </div>
  <div class="todo-list" id="list"></div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Edit Tugas</div>
      <div class="sheet-body">
        <input type="text" class="edit-input" id="edit-input" maxlength="200" />
        <div class="edit-priority-row">
          <span class="edit-priority-label">Prioritas:</span>
          <button class="priority-btn" data-p="high" id="p-high">🔴 Tinggi</button>
          <button class="priority-btn" data-p="medium" id="p-medium">🟡 Sedang</button>
          <button class="priority-btn" data-p="low" id="p-low">🟢 Rendah</button>
        </div>
      </div>
      <div class="sheet-actions">
        <button class="btn-cancel" id="cancel-edit">Batal</button>
        <button class="btn-update" id="confirm-edit">Simpan Perubahan</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span id="toast-msg">Tugas dihapus</span>
    <span class="toast-undo" id="toast-undo">Urungkan</span>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>

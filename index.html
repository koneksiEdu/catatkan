<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>GoNulis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D0D0F;
      --surface: #161618;
      --surface2: #1E1E21;
      --surface3: #252528;
      --accent: #C8FF00;
      --accent-dim: #8fb300;
      --accent-soft: rgba(200,255,0,0.08);
      --danger: #FF4458;
      --danger-soft: rgba(255,68,88,0.1);
      --warning: #FFB800;
      --warning-soft: rgba(255,184,0,0.1);
      --text-primary: #F0F0F2;
      --text-secondary: #808086;
      --text-tertiary: #45454A;
      --separator: rgba(255,255,255,0.07);
      --radius: 18px;
      --radius-sm: 12px;
      --radius-xs: 8px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      padding-bottom: 60px;
      position: relative;
    }

    /* Ambient glow background */
    body::before {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 360px;
      height: 360px;
      background: radial-gradient(circle, rgba(200,255,0,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 20px 20px 16px;
      background: rgba(13,13,15,0.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--separator);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1 .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .count-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-soft);
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      border-radius: 20px;
      padding: 4px 10px;
      border: 1px solid rgba(200,255,0,0.2);
    }

    .header-sub {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 6px;
      font-weight: 400;
      letter-spacing: 0.2px;
    }

    /* Compose area */
    .compose {
      margin: 16px 16px 8px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--separator);
      overflow: hidden;
      transition: border-color 0.2s;
      position: relative;
      z-index: 1;
    }

    .compose:focus-within {
      border-color: rgba(200,255,0,0.3);
      box-shadow: 0 0 0 4px rgba(200,255,0,0.04);
    }

    .compose-label {
      padding: 14px 16px 0;
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }

    textarea {
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      padding: 10px 16px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: var(--text-primary);
      background: transparent;
      min-height: 96px;
      line-height: 1.65;
    }

    textarea::placeholder { color: var(--text-tertiary); }

    .compose-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 14px;
      border-top: 1px solid var(--separator);
    }

    .char-count {
      font-size: 11px;
      color: var(--text-tertiary);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .btn-save {
      background: var(--accent);
      color: #0D0D0F;
      border: none;
      border-radius: 30px;
      padding: 9px 20px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: 0.2px;
    }

    .btn-save:hover { background: #d4ff1a; transform: translateY(-1px); }
    .btn-save:active { transform: scale(0.95) translateY(0); }
    .btn-save:disabled { background: var(--surface3); color: var(--text-tertiary); cursor: not-allowed; transform: none; }

    .btn-save svg { width: 14px; height: 14px; }

    /* Section label */
    .section-label {
      padding: 16px 20px 8px;
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      position: relative;
      z-index: 1;
    }

    /* Notes list */
    .notes-list {
      margin: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .note-item {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--separator);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.2s, transform 0.15s;
      animation: slideIn 0.25s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .note-item:hover {
      border-color: rgba(255,255,255,0.12);
    }

    .note-body { flex: 1; min-width: 0; }

    .note-text {
      font-size: 14.5px;
      font-weight: 400;
      line-height: 1.65;
      color: var(--text-primary);
      word-break: break-word;
      white-space: pre-wrap;
    }

    .note-meta {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 8px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .note-meta::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 4px;
      background: var(--text-tertiary);
      border-radius: 50%;
    }

    /* Action buttons row */
    .note-actions {
      display: flex;
      gap: 8px;
      border-top: 1px solid var(--separator);
      padding-top: 10px;
    }

    .btn-edit, .btn-delete {
      flex: 1;
      border: none;
      border-radius: var(--radius-xs);
      padding: 8px 12px;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      letter-spacing: 0.3px;
    }

    .btn-edit {
      background: var(--warning-soft);
      color: var(--warning);
      border: 1px solid rgba(255,184,0,0.15);
    }

    .btn-edit:hover { background: rgba(255,184,0,0.15); }
    .btn-edit:active { opacity: 0.7; transform: scale(0.97); }

    .btn-delete {
      background: var(--danger-soft);
      color: var(--danger);
      border: 1px solid rgba(255,68,88,0.15);
    }

    .btn-delete:hover { background: rgba(255,68,88,0.16); }
    .btn-delete:active { opacity: 0.7; transform: scale(0.97); }

    .btn-edit svg, .btn-delete svg { width: 13px; height: 13px; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 52px 24px;
      color: var(--text-tertiary);
    }

    .empty-icon {
      font-size: 52px;
      margin-bottom: 16px;
      display: block;
      filter: grayscale(0.3);
    }

    .empty-title {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .empty-desc {
      font-size: 13px;
      margin-top: 6px;
      font-weight: 400;
      line-height: 1.5;
    }

    /* Edit modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-sheet {
      background: var(--surface2);
      width: 100%;
      border-radius: 24px 24px 0 0;
      padding: 0 0 40px;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.34, 1.3, 0.64, 1);
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .modal-overlay.open .modal-sheet {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 40px;
      height: 4px;
      background: var(--surface3);
      border-radius: 2px;
      margin: 14px auto 18px;
    }

    .sheet-title {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      padding: 0 20px 16px;
      color: var(--text-primary);
      border-bottom: 1px solid var(--separator);
    }

    .sheet-body { padding: 16px; }

    .edit-textarea {
      width: 100%;
      border: 1px solid var(--separator);
      border-radius: var(--radius-sm);
      outline: none;
      padding: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: var(--text-primary);
      background: var(--surface);
      min-height: 130px;
      resize: none;
      line-height: 1.65;
      transition: border-color 0.2s;
    }

    .edit-textarea:focus {
      border-color: rgba(200,255,0,0.4);
      box-shadow: 0 0 0 3px rgba(200,255,0,0.05);
    }

    .sheet-actions {
      display: flex;
      gap: 10px;
      padding: 12px 16px 0;
    }

    .btn-cancel {
      flex: 1;
      background: var(--surface3);
      color: var(--text-secondary);
      border: none;
      border-radius: var(--radius-sm);
      padding: 14px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-cancel:hover { background: var(--surface); color: var(--text-primary); }
    .btn-cancel:active { opacity: 0.7; }

    .btn-update {
      flex: 2;
      background: var(--accent);
      color: #0D0D0F;
      border: none;
      border-radius: var(--radius-sm);
      padding: 14px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-update:hover { background: #d4ff1a; }
    .btn-update:active { transform: scale(0.97); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(90px);
      background: var(--surface2);
      color: var(--text-primary);
      padding: 12px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 300;
      transition: transform 0.32s cubic-bezier(0.34, 1.4, 0.64, 1);
      white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      border: 1px solid var(--separator);
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast-undo {
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
    }

    /* note-count-badge compatibility for JS */
    #note-count-badge {
      display: none; /* replaced by count-pill in header-top */
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-top">
      <h1>GoNulis <span class="dot"></span></h1>
      <span class="count-pill" id="note-count-badge-pill">0 catatan</span>
    </div>
    <div class="header-sub">Tulis, simpan, dan kelola catatan kamu</div>
  </div>

  <!-- hidden span to keep JS compatibility -->
  <span id="note-count-badge" style="display:none"></span>

  <div class="compose">
    <div class="compose-label">Catatan Baru</div>
    <textarea id="note" placeholder="Apa yang ingin kamu catat hari ini?" maxlength="500"></textarea>
    <div class="compose-footer">
      <span class="char-count" id="char-count">0 / 500</span>
      <button class="btn-save" id="save" disabled>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/>
        </svg>
        Simpan
      </button>
    </div>
  </div>

  <div class="section-label">Semua Catatan</div>
  <div class="notes-list" id="list"></div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Edit Catatan</div>
      <div class="sheet-body">
        <textarea class="edit-textarea" id="edit-textarea" maxlength="500"></textarea>
      </div>
      <div class="sheet-actions">
        <button class="btn-cancel" id="cancel-edit">Batal</button>
        <button class="btn-update" id="confirm-edit">Simpan Perubahan</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span id="toast-msg">Catatan dihapus</span>
    <span class="toast-undo" id="toast-undo">Urungkan</span>
  </div>

  <script>
    // Patch: sync count pill with badge span for JS compatibility
    const origBadge = document.getElementById('note-count-badge');
    const pill = document.getElementById('note-count-badge-pill');
    const observer = new MutationObserver(() => {
      const txt = origBadge.textContent.trim();
      // txt is like "5" from JS; format to "5 catatan"
      if (txt) {
        pill.textContent = txt + ' catatan';
      } else {
        pill.textContent = '0 catatan';
      }
    });
    observer.observe(origBadge, { childList: true, subtree: true, characterData: true });

    // Also patch innerHTML for count display
    const origDescriptor = Object.getOwnPropertyDescriptor(Element.prototype, 'textContent');
  </script>

  <script type="module" src="./src/main.js"></script>
</body>
</html>

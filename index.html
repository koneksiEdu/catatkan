<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Tuliskan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #b40d0d;
      --red-deep:   #8a0909;
      --red-light:  #d41414;
      --red-glow:   rgba(180,13,13,0.18);
      --red-tint:   #fff0f0;
      --red-soft:   rgba(180,13,13,0.08);

      --bg:         #faf8f8;
      --surface:    #ffffff;
      --surface2:   #f5f1f1;
      --ink:        #1a0a0a;
      --ink-mid:    #5a3a3a;
      --ink-faint:  #b09090;
      --line:       #ede4e4;

      --shadow-sm:  0 2px 8px rgba(180,13,13,0.07);
      --shadow:     0 4px 24px rgba(180,13,13,0.10);
      --shadow-lg:  0 12px 40px rgba(180,13,13,0.16);

      --radius:     18px;
      --radius-sm:  10px;
      --radius-xs:  7px;
    }

    /* ─── Scrollbar ─────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--red-glow); border-radius: 4px; }

    /* ─── Body ───────────────────────────────── */
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      padding-bottom: 50px;
      /* subtle noise texture */
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    }

    /* ─── Header ─────────────────────────────── */
    .header {
      background: var(--red);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 22px 22px 18px;
      /* diagonal ribbon accent */
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 120px; height: 120px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: -20px; right: 40px;
      width: 70px; height: 70px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.3px;
      color: #fff;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1 .icon {
      font-size: 22px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.2));
    }

    .header-sub {
      font-size: 12.5px;
      color: rgba(255,255,255,0.65);
      margin-top: 3px;
      font-weight: 500;
      position: relative;
      z-index: 1;
      letter-spacing: 0.2px;
    }

    /* ─── Compose ─────────────────────────────── */
    .compose {
      margin: 18px 16px 10px;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1.5px solid var(--line);
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .compose:focus-within {
      box-shadow: var(--shadow-lg);
      border-color: rgba(180,13,13,0.22);
    }

    textarea {
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      padding: 16px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--ink);
      background: transparent;
      min-height: 96px;
      line-height: 1.6;
    }

    textarea::placeholder { color: var(--ink-faint); }

    .compose-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px 14px;
      border-top: 1px solid var(--line);
    }

    .char-count {
      font-size: 11.5px;
      color: var(--ink-faint);
      font-weight: 600;
    }

    .btn-save {
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 22px;
      padding: 8px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 5px;
      box-shadow: 0 3px 10px rgba(180,13,13,0.30);
      letter-spacing: 0.2px;
    }

    .btn-save:hover { background: var(--red-light); box-shadow: 0 4px 14px rgba(180,13,13,0.38); }
    .btn-save:active { transform: scale(0.95); opacity: 0.88; }
    .btn-save:disabled {
      background: var(--line);
      color: var(--ink-faint);
      box-shadow: none;
      cursor: not-allowed;
    }

    /* ─── Section label ───────────────────────── */
    .section-label {
      padding: 10px 22px 7px;
      font-size: 11px;
      font-weight: 700;
      color: var(--ink-faint);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ─── Notes list ──────────────────────────── */
    .notes-list {
      margin: 0 16px;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      border: 1.5px solid var(--line);
    }

    .note-item {
      position: relative;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 15px 16px;
      transition: background 0.15s;
    }

    .note-item:hover { background: var(--red-soft); }

    .note-item:not(:last-child) {
      border-bottom: 1px solid var(--line);
    }

    /* left accent bar */
    .note-item::before {
      content: '';
      position: absolute;
      left: 0; top: 14px; bottom: 14px;
      width: 3px;
      background: var(--red);
      border-radius: 0 3px 3px 0;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .note-item:hover::before { opacity: 1; }

    .note-body { flex: 1; min-width: 0; }

    .note-text {
      font-size: 14.5px;
      font-weight: 500;
      line-height: 1.55;
      color: var(--ink);
      word-break: break-word;
      white-space: pre-wrap;
    }

    .note-meta {
      font-size: 11px;
      color: var(--ink-faint);
      margin-top: 6px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ─── Action buttons ──────────────────────── */
    .note-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      align-items: flex-start;
      padding-top: 2px;
    }

    .btn-edit, .btn-delete {
      border: none;
      border-radius: var(--radius-xs);
      padding: 5px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .btn-edit {
      background: #fff5e6;
      color: #c06000;
      border: 1px solid #ffe0b2;
    }

    .btn-edit:hover { background: #ffe0b2; }
    .btn-edit:active { opacity: 0.7; transform: scale(0.95); }

    .btn-delete {
      background: var(--red-tint);
      color: var(--red);
      border: 1px solid rgba(180,13,13,0.12);
    }

    .btn-delete:hover { background: rgba(180,13,13,0.12); }
    .btn-delete:active { opacity: 0.7; transform: scale(0.95); }

    /* ─── Empty state ─────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 52px 24px;
      color: var(--ink-faint);
    }

    .empty-icon {
      font-size: 44px;
      margin-bottom: 14px;
      display: block;
      filter: grayscale(0.2);
    }

    .empty-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--ink-mid);
      margin-bottom: 5px;
    }

    .empty-desc {
      font-size: 13px;
      margin-top: 4px;
      font-weight: 500;
    }

    /* ─── Edit modal ──────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26,10,10,0.45);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      backdrop-filter: blur(3px);
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-sheet {
      background: var(--surface);
      width: 100%;
      border-radius: 22px 22px 0 0;
      padding: 0 0 34px;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
      border-top: 3px solid var(--red);
      box-shadow: 0 -8px 40px rgba(180,13,13,0.12);
    }

    .modal-overlay.open .modal-sheet {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: var(--red);
      border-radius: 2px;
      margin: 14px auto 18px;
      opacity: 0.3;
    }

    .sheet-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      padding: 0 20px 16px;
      color: var(--ink);
      border-bottom: 1px solid var(--line);
    }

    .sheet-body { padding: 16px; }

    .edit-textarea {
      width: 100%;
      border: 1.5px solid var(--line);
      border-radius: var(--radius-sm);
      outline: none;
      padding: 13px 15px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--ink);
      background: var(--surface2);
      min-height: 120px;
      resize: none;
      line-height: 1.55;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .edit-textarea:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px var(--red-glow);
      background: #fff;
    }

    .sheet-actions {
      display: flex;
      gap: 10px;
      padding: 12px 16px 0;
    }

    .btn-cancel {
      flex: 1;
      background: var(--surface2);
      color: var(--ink-mid);
      border: 1.5px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-cancel:hover { background: var(--line); }
    .btn-cancel:active { opacity: 0.7; }

    .btn-update {
      flex: 2;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 4px 14px rgba(180,13,13,0.28);
    }

    .btn-update:hover { background: var(--red-light); }
    .btn-update:active { transform: scale(0.97); }

    /* ─── Toast ───────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 26px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink);
      color: #fff;
      padding: 12px 20px;
      border-radius: 22px;
      font-size: 13.5px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 300;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
      box-shadow: 0 6px 24px rgba(26,10,10,0.28);
      border-left: 3px solid var(--red);
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    .toast-undo {
      color: #ff6b6b;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.2px;
    }

    .toast-undo:hover { color: #ff8a8a; }

    /* ─── Count badge ─────────────────────────── */
    .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.2);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 800;
      border-radius: 9px;
      padding: 2px 8px;
      margin-left: 6px;
      border: 1px solid rgba(255,255,255,0.25);
    }

    /* ─── Dark mode ───────────────────────────── */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:       #120808;
        --surface:  #1e0e0e;
        --surface2: #2a1414;
        --ink:      #f5e8e8;
        --ink-mid:  #c49090;
        --ink-faint: #6e4444;
        --line:     #2e1818;
        --red-soft: rgba(180,13,13,0.12);
        --red-tint: rgba(180,13,13,0.10);
      }

      .btn-edit {
        background: #2a1800;
        color: #e08a30;
        border-color: #3a2800;
      }

      .btn-edit:hover { background: #3a2800; }

      body {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1><span class="icon"></span> Tuliskan <span id="note-count-badge"></span></h1>
    <div class="header-sub">Tulis, simpan, dan kelola catatan kamu</div>
  </div>

  <div class="compose">
    <textarea id="note" placeholder="Tulis catatan baru..." maxlength="500"></textarea>
    <div class="compose-footer">
      <span class="char-count" id="char-count">0 / 500</span>
      <button class="btn-save" id="save" disabled>
        <span>＋</span> Simpan
      </button>
    </div>
  </div>

  <div class="section-label">Semua Catatan</div>
  <div class="notes-list" id="list"></div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Edit Catatan</div>
      <div class="sheet-body">
        <textarea class="edit-textarea" id="edit-textarea" maxlength="500"></textarea>
      </div>
      <div class="sheet-actions">
        <button class="btn-cancel" id="cancel-edit">Batal</button>
        <button class="btn-update" id="confirm-edit">Simpan Perubahan</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span id="toast-msg">Catatan dihapus</span>
    <span class="toast-undo" id="toast-undo">Urungkan</span>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
